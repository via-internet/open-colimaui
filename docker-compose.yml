name: opencolimaui

services:
  backend:
    build:
      context: ./backend
    container_name: opencolimaui-backend
    ports:
      - "8000:8000"
    volumes:
      - ${COLIMA_SOCKET_PATH:-$HOME/.colima/default/docker.sock}:/var/run/docker.sock
    environment:
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - DOCKER_HOST=unix:///var/run/docker.sock

  frontend:
    build:
      context: ./frontend
    container_name: opencolimaui-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
